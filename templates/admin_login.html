{% extends "base.html" %}
{% block title %}Admin Login - BusTracker{% endblock %}
{% block content %}

<div class="auth-wrapper">
    <div class="auth-card" style="border-top: 4px solid #f39c12;">
        <div style="text-align: center; margin-bottom: 20px;">
            <div style="display: inline-flex; align-items: center; justify-content: center; width: 60px; height: 60px; background: #fef5e7; border-radius: 50%; margin-bottom: 12px;">
                <span style="font-size: 28px;">⚙️</span>
            </div>
        </div>
        <h2 style="text-align: center;">Admin Panel Access</h2>
        <p class="sub" style="text-align: center;">System Administration Login</p>

        <form method="POST" action="{{ url_for('admin_login') }}">
            <div class="form-group">
                <label for="email">Admin Email *</label>
                <input type="email" id="email" name="email" placeholder="admin@cdips.edu" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Admin Password *</label>
                <input type="password" id="password" name="password" placeholder="Enter admin password" required minlength="6">
                <div class="hint">⚠️ Admin access only - Minimum 6 characters</div>
            </div>
            <button type="submit" class="btn-submit" style="background: #f39c12;">Admin Login</button>
        </form>

        <div class="auth-footer">
            <div style="margin-bottom: 8px;">
                <a href="{{ url_for('student_login') }}" style="color: #3498db; font-weight: bold;">🎓 Student Login</a>
            </div>
            <div style="font-size: 12px; color: #94a3b8;">
                <a href="{{ url_for('home') }}">← Back to Home</a>
            </div>
        </div>
    </div>
</div>

<style>
.btn-submit:hover {
    background: #e67e22 !important;
}
</style>

{% endblock %}
