{% extends "base.html" %}
{% block title %}Student Login - BusTracker{% endblock %}
{% block content %}

<div class="auth-wrapper">
    <div class="auth-card" style="border-top: 4px solid #3498db;">
        <div style="text-align: center; margin-bottom: 20px;">
            <div style="display: inline-flex; align-items: center; justify-content: center; width: 60px; height: 60px; background: #e6f1fb; border-radius: 50%; margin-bottom: 12px;">
                <span style="font-size: 28px;">🎓</span>
            </div>
        </div>
        <h2 style="text-align: center;">Student Login</h2>
        <p class="sub" style="text-align: center;">Track your college bus in real-time</p>

        <form method="POST" action="{{ url_for('student_login') }}">
            <div class="form-group">
                <label for="email">Student Email *</label>
                <input type="email" id="email" name="email" placeholder="student@example.com" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required minlength="6">
                <div class="hint">Minimum 6 characters</div>
            </div>
            <button type="submit" class="btn-submit">Login to Dashboard</button>
        </form>

        <div class="auth-footer">
            <div style="margin-bottom: 12px;">
                Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
            </div>
            <div style="border-top: 1px solid #e2e8f0; padding-top: 12px; margin-top: 12px;">
                <a href="{{ url_for('admin_login') }}" style="color: #f39c12; font-weight: bold;">⚙️ Admin Login</a>
            </div>
            <div style="font-size: 12px; color: #94a3b8; margin-top: 8px;">
                <a href="{{ url_for('home') }}">← Back to Home</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
